<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>seller • popstar</title>
  <style>
    :root{
      --brand:#8ACE00;
      --bg:#f5f5f2;
      --ink:#0b0b0c;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      font-family:-apple-system,BlinkMacSystemFont,"sf pro text",system-ui;
      color:var(--ink);
      text-transform:lowercase;
    }
    .wrap{max-width:980px; margin:40px auto; padding:0 16px;}
    h1{font-size:42px; margin:0 0 10px; font-weight:1000; letter-spacing:-.04em;}
    .logout{
      display:inline-flex;
      padding:10px 14px;
      border-radius:14px;
      border:2px solid #000;
      background:#000;
      color:#fff;
      font-weight:1000;
      cursor:pointer;
      margin-top:20px;
    }
    .logout:hover{background:var(--brand); color:#000;}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>seller dashboard</h1>
    <div id="email"></div>
    <button class="logout" id="logoutBtn">log out</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://otvznctmwutbwulbhfvx.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90dnpuY3Rtd3V0Ynd1bGJoZnZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNzc3MzcsImV4cCI6MjA4NzY1MzczN30.txShYO4rqLSMHeLuN_2rzRmvXZK3mnPsaabFtTa8Ph8";

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function protectPage() {
      const { data } = await sb.auth.getSession();

      if (!data.session) {
        window.location.href = "seller-login.html";
        return;
      }

      document.getElementById("email").textContent = "logged in as: " + data.session.user.email;
    }

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await sb.auth.signOut();
      window.location.href = "seller-login.html";
    });

    protectPage();
  </script>
</body>
</html>
