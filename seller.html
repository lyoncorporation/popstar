    .card{

    .hint{font-size:13px; font-weight:900; color:var(--muted); margin-top:6px;}

  <!-- Popstar Supabase bootstrap (needed by seller.popstar.* scripts) -->
  <script>
  (function(){
    try{
      function readMeta(name){
        var el = document.querySelector('meta[name="' + name + '"]');
        return el ? el.getAttribute('content') : '';
      }

      var URL = readMeta('popstar-supabase-url');
      var KEY = readMeta('popstar-supabase-anon-key');

      // Patch createClient so *all* code on the page ends up using a single client instance.
      // This prevents "Multiple GoTrueClient instances" and avoids session desync bugs.
      if (window.supabase && typeof window.supabase.createClient === 'function' && !window.__POPSTAR_CREATECLIENT_PATCHED){
        window.__POPSTAR_CREATECLIENT_PATCHED = true;
        var __origCreateClient = window.supabase.createClient.bind(window.supabase);

        window.supabase.createClient = function patchedCreateClient(){
          if (window.__POPSTAR_SB) return window.__POPSTAR_SB;
          var c = __origCreateClient.apply(null, arguments);
          window.__POPSTAR_SB = c;
          return c;
        };
      }

      var _clientPromise = null;

      window.initSupabase = window.initSupabase || function initSupabase(){
        try{
          if (window.__POPSTAR_SB) return Promise.resolve(window.__POPSTAR_SB);

          if (!window.supabase || typeof window.supabase.createClient !== 'function'){
            console.error('[popstar] supabase-js not loaded yet');
            return Promise.resolve(null);
          }
          if (!URL || !KEY){
            console.error('[popstar] missing supabase url/anon key meta tags');
            return Promise.resolve(null);
          }

          if (_clientPromise) return _clientPromise;

          _clientPromise = Promise.resolve(
            window.supabase.createClient(URL, KEY, {
              auth: {
                persistSession: true,
                autoRefreshToken: true,
                detectSessionInUrl: true
              }
            })
          ).then(function(c){
            window.__POPSTAR_SB = c;
            return c;
          });

          return _clientPromise;
        } catch(e){
          console.error('[popstar] initSupabase failed', e);
          return Promise.resolve(null);
        }
      };
    } catch(e){
      console.error('[popstar] bootstrap failed', e);
    }
  })();
  </script>


  <script>
  // Popstar: enforce square (1:1) image uploads for profile + item images.
  (function(){
    try{
      function $(id){ return document.getElementById(id); }

      function setStatus(id, msg){
        var el = $(id);
        if (!el) return;
        el.textContent = msg || "";
      }

      function hidePreview(id){
        var img = $(id);
        if (!img) return;
        img.style.display = "none";
        img.removeAttribute("src");
      }

      function showPreview(id, file){
        var img = $(id);
        if (!img) return;
        try{
          var url = URL.createObjectURL(file);
          img.onload = function(){
            try{ URL.revokeObjectURL(url); }catch(e){}
          };
          img.src = url;
          img.style.display = "block";
        }catch(e){}
      }

      function validateSquare(file){
        return new Promise(function(resolve, reject){
          if (!file) return reject("no file selected");
          if (!/^image\//i.test(file.type || "")) return reject("file must be an image");
          var img = new Image();
          var url = URL.createObjectURL(file);
          img.onload = function(){
            try{
              var w = img.naturalWidth || img.width || 0;
              var h = img.naturalHeight || img.height || 0;
              if (w && h && w === h) resolve(true);
              else reject("image must be square (1:1 ratio)");
            } finally{
              try{ URL.revokeObjectURL(url); }catch(e){}
            }
          };
          img.onerror = function(){
            try{ URL.revokeObjectURL(url); }catch(e){}
            reject("invalid image file");
          };
          img.src = url;
        });
      }

      var map = [
        { input: "file_profile", status: "status_profile", preview: "prev_profile" },
        { input: "file_item1", status: "status_item1", preview: "prev_item1" },
        { input: "file_item2", status: "status_item2", preview: "prev_item2" },
        { input: "file_item3", status: "status_item3", preview: "prev_item3" }
      ];

      // Capture-phase handler so we can validate before any downstream listeners run.
      function attach(entry){
        var input = $(entry.input);
        if (!input) return;

        input.addEventListener("change", function(ev){
          try{
            // If we already validated this selection, allow other handlers to run.
            if (input.dataset.squareOk === "1"){
              delete input.dataset.squareOk;
              return;
            }

            var file = input.files && input.files[0];
            if (!file) return;

            // Block other listeners until we validate.
            if (ev && typeof ev.stopImmediatePropagation === "function") ev.stopImmediatePropagation();
            if (ev && typeof ev.preventDefault === "function") ev.preventDefault();

            setStatus(entry.status, "checking image…");
            hidePreview(entry.preview);

            validateSquare(file).then(function(){
              // Show preview (cropped by CSS via object-fit: cover)
              showPreview(entry.preview, file);
              setStatus(entry.status, "✓ square image accepted");
              // Allow the rest of the app to handle the same file now.
              input.dataset.squareOk = "1";
              // Re-dispatch change so existing upload logic continues normally.
              input.dispatchEvent(new Event("change", { bubbles: true }));
            }).catch(function(msg){
              setStatus(entry.status, msg || "image must be square (1:1 ratio)");
              hidePreview(entry.preview);
              // Clear selection to prevent accidental upload attempts.
              input.value = "";
            });

          }catch(e){
            setStatus(entry.status, "could not validate image");
          }
        }, true);
      }

      map.forEach(attach);

      // Update hints in UI
      var hints = document.querySelectorAll(".mediaHint");
      for (var i=0; i<hints.length; i++){
        if (!hints[i].textContent || !hints[i].textContent.trim()){
          hints[i].textContent = "required: square image (1:1)";
        }
      }
    }catch(e){}
  })();
  </script>
