<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>popstar ★ — contact</title>

<!-- favicons -->
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="shortcut icon" href="/favicon.ico">

<style>
:root{
  --brand:#8ACE00;
  --bg:#f5f5f2;
  --ink:#0b0b0c;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"sf pro text",system-ui;
  background:var(--bg);
  color:var(--ink);
  text-transform:lowercase;
}

.wrap{
  max-width:720px;
  margin:0 auto;
  padding:40px 20px 80px;
}

h1{
  font-size:64px;
  margin:0 0 6px;
  font-weight:1000;
  letter-spacing:-.04em;
}

.sub{
  font-weight:900;
  margin-bottom:30px;
  opacity:.7;
}

.formBox{
  background:#fff;
  border:2px solid #000;
  border-radius:18px;
  padding:24px;
}

label{
  font-weight:900;
  display:block;
  margin-bottom:6px;
}

input, textarea{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:2px solid #000;
  font-weight:700;
  font-size:14px;
  margin-bottom:18px;
  box-sizing:border-box;
}

button{
  background:#000;
  color:#fff;
  border:2px solid #000;
  border-radius:999px;
  padding:12px 18px;
  font-weight:1000;
  cursor:pointer;
}

button:hover{
  background:var(--brand);
  color:#000;
}

.back{
  margin-top:24px;
  display:inline-block;
  text-decoration:none;
  border:2px solid #000;
  padding:10px 14px;
  border-radius:999px;
  font-weight:900;
  color:#000;
}

.back:hover{
  background:var(--brand);
  color:#000;
}
</style>
</head>

<body>

<div class="wrap">

<h1>popstar ★</h1>
<div class="sub">contact</div>

<div class="formBox">

<form action="https://formsubmit.co/popstarthewebsite@gmail.com" method="POST">

<input type="hidden" name="_subject" value="popstar contact form">
<input type="hidden" name="_captcha" value="false">

<label>name</label>
<input type="text" name="name" required>

<label>email</label>
<input type="email" name="email" required>

<label>message</label>
<textarea name="message" rows="6" required></textarea>

<button type="submit">send message</button>

</form>

</div>

<a class="back" href="index.html">← back to popstar</a>

</div>

</body>
</html>
